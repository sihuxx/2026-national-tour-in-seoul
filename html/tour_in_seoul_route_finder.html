<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0
  }

  body {
    font-family: var(--font-sans)
  }

  #app {
    padding: 1rem 0
  }

  h2.sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0)
  }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    flex-wrap: wrap
  }

  .badge {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 20px;
    font-weight: 500
  }

  .badge.dep {
    background: #E6F1FB;
    color: #0C447C
  }

  .badge.arr {
    background: #FAECE7;
    color: #712B13
  }

  .badge.none {
    background: var(--color-background-secondary);
    color: var(--color-text-secondary)
  }

  .tab-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px
  }

  .tab-btn {
    font-size: 13px;
    padding: 5px 14px;
    border-radius: 20px;
    border: 0.5px solid var(--color-border-secondary);
    background: var(--color-background-primary);
    color: var(--color-text-secondary);
    cursor: pointer;
    transition: all .15s
  }

  .tab-btn.active {
    background: var(--color-background-tertiary);
    color: var(--color-text-primary);
    border-color: var(--color-border-primary);
    font-weight: 500
  }

  .map-wrap {
    position: relative;
    width: 100%;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-lg);
    overflow: hidden;
    background: var(--color-background-primary)
  }

  #map-svg {
    width: 100%;
    display: block
  }

  .popup {
    position: absolute;
    background: var(--color-background-primary);
    border: 0.5px solid var(--color-border-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    z-index: 10;
    box-shadow: 0 2px 8px rgba(0, 0, 0, .08)
  }

  .popup-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 2px
  }

  .popup-btns {
    display: flex;
    gap: 5px
  }

  .popup-btns button {
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 12px;
    border: 0.5px solid var(--color-border-secondary);
    cursor: pointer;
    background: var(--color-background-secondary);
    color: var(--color-text-primary)
  }

  .popup-btns button:hover {
    background: var(--color-background-tertiary)
  }

  .route-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px
  }

  .route-item {
    padding: 10px 12px;
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: var(--border-radius-md);
    cursor: pointer;
    background: var(--color-background-primary);
    transition: border-color .15s
  }

  .route-item:hover {
    border-color: var(--color-border-primary)
  }

  .route-item.selected {
    border: 1.5px solid #378ADD;
    background: #E6F1FB
  }

  .route-path {
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text-primary);
    margin-bottom: 4px;
    word-break: break-all
  }

  .route-meta {
    font-size: 12px;
    color: var(--color-text-secondary);
    display: flex;
    gap: 12px
  }

  .empty-msg {
    font-size: 13px;
    color: var(--color-text-secondary);
    text-align: center;
    padding: 20px;
    border: 0.5px dashed var(--color-border-tertiary);
    border-radius: var(--border-radius-md)
  }
</style>

<div id="app">
  <h2 class="sr-only">투어 in 서울 노선도 경로 탐색 예제</h2>
  <div class="top-bar">
    <span style="font-size:14px;font-weight:500;color:var(--color-text-primary)">경유지를 클릭해 출발지/도착지를 설정하세요</span>
    <span class="badge none" id="dep-badge">출발지 미설정</span>
    <span class="badge none" id="arr-badge">도착지 미설정</span>
    <button id="reset-btn"
      style="font-size:12px;padding:4px 10px;border-radius:12px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer;margin-left:auto">초기화</button>
  </div>

  <div class="map-wrap">
    <svg id="map-svg" viewBox="0 0 1100 700" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="popup" id="popup" style="display:none">
      <div class="popup-title" id="popup-name"></div>
      <div class="popup-btns">
        <button id="btn-dep">출발지</button>
        <button id="btn-arr">도착지</button>
      </div>
    </div>
  </div>

  <div class="tab-row" id="tab-row" style="margin-top:12px">
    <button class="tab-btn active" data-mode="shortest">최단거리</button>
    <button class="tab-btn" data-mode="transfer">최소환승</button>
  </div>

  <div class="route-list" id="route-list">
    <div class="empty-msg">출발지와 도착지를 설정하면 코스 5개가 표시됩니다.</div>
  </div>
</div>

<script>
  const LINE_COLORS = {
    "1": "#22a563", "2": "#22a563", "3": "#b08030", "4": "#d060a0", "5": "#5050c8"
  };
  const LINE_STROKE = {
    "1": "#22a563", "2": "#22a563", "3": "#c08040", "4": "#d060a0", "5": "#4848cc"
  };

  const STATIONS = { "data": [{ "idx": "1", "name": "서울타워", "coordinates": [700, 594], "route": { "1": ["31", "2"] } }, { "idx": "2", "name": "국립극장", "coordinates": [840, 594], "route": { "1": ["1", "3"] } }, { "idx": "3", "name": "동대문", "coordinates": [840, 391], "route": { "1": ["2", "4"], "3": ["29", "30"] } }, { "idx": "4", "name": "한양도성", "coordinates": [840, 230], "route": { "1": ["3", "6"] } }, { "idx": "5", "name": "마로니에공원", "coordinates": [971, 186], "route": { "1": ["6"] } }, { "idx": "6", "name": "대학로", "coordinates": [883, 186], "route": { "1": ["4", "5"] } }, { "idx": "7", "name": "월드컵경기장", "coordinates": [134, 226], "route": { "2": ["23"] } }, { "idx": "8", "name": "숭례문", "coordinates": [350, 509], "route": { "1": ["22", "33"], "2": ["9", "10"] } }, { "idx": "9", "name": "신촌", "coordinates": [172, 509], "route": { "2": ["20", "8"] } }, { "idx": "10", "name": "서울역", "coordinates": [566, 509], "route": { "2": ["8", "11"], "4": ["32", "18"] } }, { "idx": "11", "name": "명동", "coordinates": [737, 509], "route": { "2": ["10", "12"] } }, { "idx": "12", "name": "광장시장", "coordinates": [768, 477], "route": { "2": ["11", "29"] } }, { "idx": "13", "name": "낙산공원", "coordinates": [768, 220], "route": { "2": ["29", "14"] } }, { "idx": "14", "name": "창덕궁", "coordinates": [731, 187], "route": { "2": ["13", "15"] } }, { "idx": "15", "name": "북촌한옥마을", "coordinates": [547, 187], "route": { "2": ["14", "36"], "4": ["25", "16"] } }, { "idx": "16", "name": "간송미술관", "coordinates": [547, 60], "route": { "4": ["15"] } }, { "idx": "17", "name": "63빌딩", "coordinates": [589, 361], "route": { "4": ["18", "25"] } }, { "idx": "18", "name": "롯데월드", "coordinates": [566, 391], "route": { "4": ["10", "17"] } }, { "idx": "19", "name": "리움미술관", "coordinates": [510, 629], "route": { "4": ["32"] } }, { "idx": "20", "name": "이대", "coordinates": [134, 471], "route": { "2": ["23", "9"] } }, { "idx": "21", "name": "상암DMC", "coordinates": [183, 187], "route": { "2": ["36"] } }, { "idx": "22", "name": "덕수궁", "coordinates": [296, 469], "route": { "1": ["8"] } }, { "idx": "23", "name": "성수동", "coordinates": [134, 309], "route": { "2": ["7", "20"], "3": ["24"] } }, { "idx": "24", "name": "카페거리", "coordinates": [220, 239], "route": { "3": ["23", "37"] } }, { "idx": "25", "name": "독립문", "coordinates": [589, 239], "route": { "3": ["26", "27"], "4": ["17", "15"] } }, { "idx": "26", "name": "서울숲", "coordinates": [466, 239], "route": { "3": ["37", "25"] } }, { "idx": "27", "name": "경희궁", "coordinates": [653, 286], "route": { "3": ["25", "28"] } }, { "idx": "28", "name": "평화시장", "coordinates": [653, 391], "route": { "3": ["27", "29"] } }, { "idx": "29", "name": "남대문", "coordinates": [768, 391], "route": { "2": ["12", "13"], "3": ["28", "3"] } }, { "idx": "30", "name": "청계천", "coordinates": [905, 391], "route": { "3": ["3"] } }, { "idx": "31", "name": "백범광장", "coordinates": [667, 550], "route": { "1": ["32", "1"] } }, { "idx": "32", "name": "경리단길", "coordinates": [510, 550], "route": { "1": ["33", "31"], "4": ["19", "10"] } }, { "idx": "33", "name": "효창공원", "coordinates": [402, 550], "route": { "1": ["8", "32"] } }, { "idx": "34", "name": "창의문", "coordinates": [200, 54], "route": { "5": ["35"] } }, { "idx": "35", "name": "통인시장", "coordinates": [200, 140], "route": { "5": ["34", "36"] } }, { "idx": "36", "name": "청와대", "coordinates": [304, 187], "route": { "2": ["15", "21"], "5": ["35", "37"] } }, { "idx": "37", "name": "경의숲길", "coordinates": [304, 239], "route": { "3": ["24", "26"], "5": ["36", "38"] } }, { "idx": "38", "name": "광화문", "coordinates": [304, 319], "route": { "5": ["37", "39"] } }, { "idx": "39", "name": "보신각", "coordinates": [374, 361], "route": { "5": ["38", "40"] } }, { "idx": "40", "name": "인사동", "coordinates": [471, 361], "route": { "5": ["39", "41"] } }, { "idx": "41", "name": "시청", "coordinates": [527, 296], "route": { "5": ["40"] } }] };

  const stations = STATIONS.data;
  const stMap = {};
  stations.forEach(s => stMap[s.idx] = s);

  let depIdx = null, arrIdx = null, selRoute = null, curMode = 'shortest';
  let popupStation = null;
  let routes = [];

  const svg = document.getElementById('map-svg');
  const popup = document.getElementById('popup');
  const popupName = document.getElementById('popup-name');
  const routeList = document.getElementById('route-list');
  const depBadge = document.getElementById('dep-badge');
  const arrBadge = document.getElementById('arr-badge');

  function dist(a, b) {
    const [ax, ay] = stMap[a].coordinates;
    const [bx, by] = stMap[b].coordinates;
    return Math.sqrt((ax - bx) ** 2 + (ay - by) ** 2);
  }

  function buildGraph() {
    const g = {};
    stations.forEach(s => {
      g[s.idx] = [];
      Object.entries(s.route).forEach(([line, neighbors]) => {
        neighbors.forEach(nid => {
          if (stMap[nid]) g[s.idx].push({ to: nid, line, dist: dist(s.idx, nid) });
        });
      });
    });
    return g;
  }
  const graph = buildGraph();

  function dijkstra(start, end) {
    const d = {}, prev = {}, prevLine = {};
    Object.keys(stMap).forEach(k => d[k] = Infinity);
    d[start] = 0;
    const visited = new Set();
    const pq = [[0, start, null]];
    while (pq.length) {
      pq.sort((a, b) => a[0] - b[0]);
      const [dd, u, ul] = pq.shift();
      if (visited.has(u)) continue;
      visited.add(u);
      if (u === end) break;
      (graph[u] || []).forEach(({ to, line, dist: ed }) => {
        const nd = dd + ed;
        if (nd < d[to]) {
          d[to] = nd;
          prev[to] = u;
          prevLine[to] = line;
          pq.push([nd, to, line]);
        }
      });
    }
    if (d[end] === Infinity) return null;
    const path = [], lines = [];
    let cur = end;
    while (cur !== start) { path.unshift(cur); lines.unshift(prevLine[cur]); cur = prev[cur]; }
    path.unshift(start);
    return { path, lines, totalDist: d[end] };
  }

  function countTransfers(lines) {
    let t = 0;
    for (let i = 1; i < lines.length; i++) if (lines[i] !== lines[i - 1]) t++;
    return t;
  }

  function kPaths(start, end, k = 10) {
    const results = [];
    const base = dijkstra(start, end);
    if (!base) return results;
    results.push(base);
    const candidates = [];
    for (let i = 0; i < Math.min(k * 3, 30) && results.length < k; i++) {
      const prev = results[results.length - 1];
      for (let si = 0; si < prev.path.length - 1; si++) {
        const spurNode = prev.path[si];
        const rootPath = prev.path.slice(0, si + 1);
        const removedEdges = new Set();
        results.forEach(r => {
          if (JSON.stringify(r.path.slice(0, si + 1)) === JSON.stringify(rootPath)) {
            const e = r.path[si] + '_' + r.path[si + 1] + '_' + r.lines[si];
            removedEdges.add(e);
          }
        });
        const savedDist = {};
        const savedPrev = {};
        const savedLine = {};
        removedEdges.forEach(e => {
          const [a, b] = e.split('_');
          if (!savedDist[a + '_' + b]) savedDist[a + '_' + b] = [];
        });
        const sub = dijkstraWithExclude(spurNode, end, removedEdges, new Set(rootPath.slice(0, -1)));
        if (sub) {
          const full = {
            path: [...rootPath.slice(0, -1), ...sub.path],
            lines: [...prev.lines.slice(0, si), ...sub.lines],
            totalDist: 0
          };
          full.totalDist = full.path.reduce((acc, n, i) => i === 0 ? 0 : acc + dist(full.path[i - 1], n), 0);
          const key = full.path.join(',');
          if (!results.some(r => r.path.join(',') === key) && !candidates.some(c => c.path.join(',') === key)) {
            candidates.push(full);
          }
        }
      }
      if (!candidates.length) break;
      candidates.sort((a, b) => a.totalDist - b.totalDist);
      results.push(candidates.shift());
    }
    return results;
  }

  function dijkstraWithExclude(start, end, removedEdges, removedNodes) {
    const d = {};
    const prev = {}, prevLine = {};
    Object.keys(stMap).forEach(k => d[k] = Infinity);
    d[start] = 0;
    const visited = new Set(removedNodes);
    const pq = [[0, start]];
    while (pq.length) {
      pq.sort((a, b) => a[0] - b[0]);
      const [dd, u] = pq.shift();
      if (visited.has(u)) continue;
      visited.add(u);
      if (u === end) break;
      (graph[u] || []).forEach(({ to, line, dist: ed }) => {
        if (removedEdges.has(u + '_' + to + '_' + line)) return;
        const nd = dd + ed;
        if (nd < d[to]) {
          d[to] = nd; prev[to] = u; prevLine[to] = line;
          pq.push([nd, to]);
        }
      });
    }
    if (d[end] === Infinity) return null;
    const path = [], lines = [];
    let cur = end;
    while (cur !== start) { path.unshift(cur); lines.unshift(prevLine[cur]); cur = prev[cur]; }
    path.unshift(start);
    return { path, lines, totalDist: d[end] };
  }

  function calcRoutes() {
    if (!depIdx || !arrIdx) return;
    const all = kPaths(depIdx, arrIdx, 10);
    all.forEach(r => {
      r.totalDist = r.path.reduce((acc, n, i) => i === 0 ? 0 : acc + dist(r.path[i - 1], n), 0);
      r.transfers = countTransfers(r.lines);
    });
    const unique = [];
    const seen = new Set();
    all.forEach(r => { const k = r.path.join(','); if (!seen.has(k)) { seen.add(k); unique.push(r); } });
    if (curMode === 'shortest') unique.sort((a, b) => a.totalDist - b.totalDist);
    else unique.sort((a, b) => a.transfers !== b.transfers ? a.transfers - b.transfers : a.totalDist - b.totalDist);
    routes = unique.slice(0, 5);
    selRoute = null;
    renderRoutes();
    renderSVG();
  }

  function renderRoutes() {
    if (!routes.length) { routeList.innerHTML = '<div class="empty-msg">경로를 찾을 수 없습니다.</div>'; return; }
    routeList.innerHTML = routes.map((r, i) => {
      const pathStr = r.path.map(id => stMap[id].name).join(' → ');
      const distKm = (r.totalDist / 100).toFixed(1);
      return `<div class="route-item${selRoute === i ? ' selected' : ''}" data-i="${i}">
      <div class="route-path">${pathStr}</div>
      <div class="route-meta"><span>거리 ${distKm}km</span><span>환승 ${r.transfers}회</span></div>
    </div>`;
    }).join('');
    routeList.querySelectorAll('.route-item').forEach(el => {
      el.addEventListener('click', () => { selRoute = +el.dataset.i; renderRoutes(); renderSVG(); });
    });
  }

  function renderSVG() {
    svg.innerHTML = '';
    const ns = 'http://www.w3.org/2000/svg';

    const drawnEdges = new Set();
    stations.forEach(s => {
      Object.entries(s.route).forEach(([line, neighbors]) => {
        neighbors.forEach(nid => {
          const key = [s.idx, nid].sort().join('_') + '_' + line;
          if (drawnEdges.has(key)) return;
          drawnEdges.add(key);
          if (!stMap[nid]) return;
          const [x1, y1] = s.coordinates, [x2, y2] = stMap[nid].coordinates;
          const el = document.createElementNS(ns, 'line');
          el.setAttribute('x1', x1); el.setAttribute('y1', y1);
          el.setAttribute('x2', x2); el.setAttribute('y2', y2);
          el.setAttribute('stroke', LINE_STROKE[line] || '#aaa');
          el.setAttribute('stroke-width', '2.5');
          el.setAttribute('opacity', '0.5');
          svg.appendChild(el);
        });
      });
    });

    if (selRoute !== null && routes[selRoute]) {
      const r = routes[selRoute];
      for (let i = 0; i < r.path.length - 1; i++) {
        const [x1, y1] = stMap[r.path[i]].coordinates, [x2, y2] = stMap[r.path[i + 1]].coordinates;
        const el = document.createElementNS(ns, 'line');
        el.setAttribute('x1', x1); el.setAttribute('y1', y1);
        el.setAttribute('x2', x2); el.setAttribute('y2', y2);
        el.setAttribute('stroke', '#378ADD'); el.setAttribute('stroke-width', '5'); el.setAttribute('opacity', '0.85');
        svg.appendChild(el);
      }
    }

    stations.forEach(s => {
      const [cx, cy] = s.coordinates;
      const isTransfer = Object.keys(s.route).length > 1;
      let fill = 'var(--color-background-primary)', stroke = '#888', r = 6;
      if (s.idx === depIdx) { fill = '#378ADD'; stroke = '#185FA5'; r = 9; }
      else if (s.idx === arrIdx) { fill = '#D85A30'; stroke = '#993C1D'; r = 9; }
      else if (selRoute !== null && routes[selRoute] && routes[selRoute].path.includes(s.idx)) {
        fill = isTransfer ? '#9E75DD' : '#B5D4F4'; stroke = isTransfer ? '#534AB7' : '#185FA5'; r = isTransfer ? 8 : 7;
      } else if (isTransfer) { fill = '#e8e8e8'; stroke = '#999'; r = 7; }

      const g = document.createElementNS(ns, 'g');
      g.style.cursor = 'pointer';
      const circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('cx', cx); circle.setAttribute('cy', cy); circle.setAttribute('r', r);
      circle.setAttribute('fill', fill); circle.setAttribute('stroke', stroke); circle.setAttribute('stroke-width', '2');
      g.appendChild(circle);

      const label = document.createElementNS(ns, 'text');
      let tx = cx + 10, ty = cy - 8, anchor = 'start';
      if (cx > 800) { tx = cx - 10; anchor = 'end'; }
      label.setAttribute('x', tx); label.setAttribute('y', ty);
      label.setAttribute('font-size', '11'); label.setAttribute('text-anchor', anchor);
      label.setAttribute('fill', 'var(--color-text-secondary)'); label.setAttribute('pointer-events', 'none');
      label.textContent = s.name;
      g.appendChild(label);

      g.addEventListener('click', (e) => { e.stopPropagation(); showPopup(s, cx, cy); });
      svg.appendChild(g);
    });
  }

  function showPopup(s, cx, cy) {
    popupStation = s;
    popupName.textContent = s.name;
    const svgRect = svg.getBoundingClientRect();
    const wrapRect = svg.parentElement.getBoundingClientRect();
    const vb = svg.viewBox.baseVal;
    const scaleX = svgRect.width / vb.width;
    const scaleY = svgRect.height / vb.height;
    const px = (cx * scaleX) + (svgRect.left - wrapRect.left) + 10;
    const py = (cy * scaleY) + (svgRect.top - wrapRect.top) - 30;
    popup.style.left = Math.min(px, wrapRect.width - 130) + 'px';
    popup.style.top = Math.max(py, 4) + 'px';
    popup.style.display = 'flex';
  }

  document.getElementById('btn-dep').addEventListener('click', () => {
    if (!popupStation) return;
    if (popupStation.idx === arrIdx) arrIdx = null;
    depIdx = popupStation.idx;
    popup.style.display = 'none';
    updateBadges(); calcRoutes(); renderSVG();
  });
  document.getElementById('btn-arr').addEventListener('click', () => {
    if (!popupStation) return;
    if (popupStation.idx === depIdx) depIdx = null;
    arrIdx = popupStation.idx;
    popup.style.display = 'none';
    updateBadges(); calcRoutes(); renderSVG();
  });
  document.getElementById('reset-btn').addEventListener('click', () => {
    depIdx = null; arrIdx = null; selRoute = null; routes = [];
    popup.style.display = 'none';
    updateBadges();
    routeList.innerHTML = '<div class="empty-msg">출발지와 도착지를 설정하면 코스 5개가 표시됩니다.</div>';
    renderSVG();
  });
  document.addEventListener('click', e => {
    if (!popup.contains(e.target)) popup.style.display = 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      curMode = btn.dataset.mode;
      calcRoutes();
    });
  });

  function updateBadges() {
    if (depIdx) { depBadge.className = 'badge dep'; depBadge.textContent = '출발: ' + stMap[depIdx].name; }
    else { depBadge.className = 'badge none'; depBadge.textContent = '출발지 미설정'; }
    if (arrIdx) { arrBadge.className = 'badge arr'; arrBadge.textContent = '도착: ' + stMap[arrIdx].name; }
    else { arrBadge.className = 'badge none'; arrBadge.textContent = '도착지 미설정'; }
  }

  renderSVG();
</script>
